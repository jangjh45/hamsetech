spring:
  application:
    name: hamsetech

  # PostgreSQL 연결 설정
  datasource:
    url: jdbc:postgresql://localhost:5432/hamsetech
    username: hamsetech
    password: hamsetech
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[format_sql]': true
        jdbc:
          lob:
            '[non_contextual_creation]': true

# 로그 레벨 설정
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
      springframework:
        security: WARN

# JWT
security:
  jwt:
    secret: ${JWT_SECRET:ChangeThisSecretKeyToAStrongLongRandomString1234567890}
    expiration-seconds: 86400

# Default admin (dev only) - 운영 환경에서는 환경변수로 반드시 주입
admin:
  username: ${ADMIN_USERNAME:admin}
  email: ${ADMIN_EMAIL:admin@example.com}
  password: ${ADMIN_PASSWORD:admin1234}
  reset-password-on-start: true

# Character encoding
server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
